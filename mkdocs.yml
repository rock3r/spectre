site_name: Spectre
site_description: Drive live Compose Desktop UIs from Kotlin tests.
site_url: https://spectre.sebastiano.dev
site_author: Sebastiano Poggi
repo_name: rock3r/spectre
repo_url: https://github.com/rock3r/spectre
edit_uri: edit/main/docs/
copyright: Copyright &copy; Sebastiano Poggi

theme:
  name: material
  logo: assets/spectre-logo.png
  favicon: assets/spectre-logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  DOCS-STYLE.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rock3r/spectre

nav:
  - Home: index.md
  - Guide:
      - guide/index.md
      - Installation: guide/installation.md
      - Getting started: guide/getting-started.md
      - The automator: guide/automator.md
      - Finding nodes: guide/selectors.md
      - Driving input: guide/interactions.md
      - Synchronization: guide/synchronization.md
      - JUnit integration: guide/junit.md
      - Recording: guide/recording.md
      - Cross-JVM access: guide/cross-jvm.md
      - IntelliJ-hosted Compose: guide/intellij.md
      - Troubleshooting: guide/troubleshooting.md
  - Reference:
      - Architecture: ARCHITECTURE.md
      - Testing policy: TESTING.md
      - Conventions: CONVENTIONS.md
      - Static analysis: STATIC-ANALYSIS.md
      - Recording limitations: RECORDING-LIMITATIONS.md
      - Worktree + Gradle pitfalls: WORKTREE-GRADLE-PITFALLS.md
