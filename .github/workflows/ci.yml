name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        # Switched from `jetbrains` to `temurin` because actions/setup-java@v5's JBR index is
        # currently missing JBR 21 — the action errors with "Could not find satisfied version
        # for SemVer '21'. Available versions: 11_0_10..., 11_0_11...". Temurin's CI build
        # behaviour matches what we need (no Compose Desktop runtime tests rely on JBR-only
        # patches; the toolchain stays at 21). Revert to `jetbrains` once JBR 21 is back in
        # the setup-java index.
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install libdbus + pkg-config (for spectre-wayland-helper Rust build)
        # `:recording`'s build pipeline runs `cargo build --release` on `native/linux/` as
        # part of processResources on Linux hosts. The helper's `dbus-rs` crate links
        # libdbus-1; pkg-config locates it. Both are missing from `ubuntu-latest` runners
        # by default. The cargo task is gated on `isLinux` so macOS/Windows runners don't
        # need any of this.
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Set up Rust (stable, MSRV-pinned to spectre-wayland-helper's rust-version)
        # `:recording:assembleWaylandHelper` runs `cargo build --release` from
        # recording/native/linux/. The crate's `rust-version = "1.75"` pin matches what
        # Ubuntu 22.04's jammy-backports apt provides on the dev VM; the action installs
        # latest stable (≥ 1.75) on the runner.
        uses: dtolnay/rust-toolchain@stable

      - name: Run checks
        run: ./gradlew check
