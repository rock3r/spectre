name: Validation tests (Linux)

# Runs the opt-in :sample-desktop validationTest* tasks on a real Linux host so the
# multi-window / popup / fidelity flows we built up under #7, #8, #14, #23 actually get
# exercised on Linux. The base `ci.yml` job runs `:check` on Linux every PR; these validation
# tasks aren't in `:check`'s default scope, so without this workflow a Linux-side regression
# in popup discovery, HiDPI mapping, or Robot input would only surface in manual testing on
# the dev VM.
#
# Also runs `:agent`'s `AgentAttachIntegrationTest` (the attach → exercise → detach
# round-trip against a child-JVM Compose fixture). That test IS in `:check`'s scope, but it
# assumption-skips on headless JVMs, and `ci.yml` runs `:check` without a display server —
# so on Linux CI it only ever *executes* here, under Xvfb. A dedicated XML verifier below
# fails the workflow if the test silently skipped instead of running.
#
# ## Display server
#
# `ubuntu-latest` runners ship without a display server, so we install `xvfb` and drive the
# whole Gradle invocation under `xvfb-run`. That gives us a real Xorg server (NOT XWayland) —
# framebuffer reads work normally, Robot input works normally, and the LinuxX11Grab Wayland
# guard from #77 stage 1 stays out of the picture (`XDG_SESSION_TYPE` and `WAYLAND_DISPLAY`
# are unset in xvfb-run's environment, no `wayland-*` socket exists in `XDG_RUNTIME_DIR`).
#
# Counterpart to `validation-windows.yml`. Historically both workflows carried a
# fail-tolerant + XML-source-of-truth pattern to ride out a Gradle test-executor protocol race
# (Windows shape `Could not write '/127.0.0.1:NNNN'` originally tracked at #72; Linux shape
# "No tests found for given includes" first observed 2026-05-11 in run 25697771548). The race
# is now suppressed at its source by serialising the validation Test tasks via a
# `ValidationTestSerialiser` BuildService in `sample-desktop/build.gradle.kts` — see the
# comment block there for the full mechanism. The XML verifier downstream stays as plain test
# hygiene (required-set existence + discovered-set inspection); the previous flake-tolerance
# layer (`continue-on-error` on the Gradle step + `::warning::` envelope-detection branch) is
# gone so a recurrence fails the workflow loudly instead of being hidden behind a warning.
#
# Local invocation (with a working DISPLAY):
#   ./gradlew :sample-desktop:validationTest :sample-desktop:validationTestPopupLayers
#   ./gradlew :agent:test --tests "*AgentAttachIntegrationTest*"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/**"
      - "agent/**"
      - "agent-runtime/**"
      - "agent-test-fixture/**"
      - "cli/**"
      - "buildSrc/**"
      - "recording/**"
      - "recording-linux/**"
      - "recording-macos/**"
      - "recording-windows/**"
      - "sample-desktop/**"
      - "testing/**"
      # Broad gradle/** rather than just libs.versions.toml so wrapper bumps and any other
      # ./gradle/-resident config changes still trigger this validation job. Mirrors the
      # filter shape of validation-windows.yml.
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - ".github/workflows/validation-linux.yml"
  push:
    branches:
      - main
    paths:
      - "core/**"
      - "agent/**"
      - "agent-runtime/**"
      - "agent-test-fixture/**"
      - "cli/**"
      - "buildSrc/**"
      - "recording/**"
      - "recording-linux/**"
      - "recording-macos/**"
      - "recording-windows/**"
      - "sample-desktop/**"
      - "testing/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - ".github/workflows/validation-linux.yml"

permissions:
  contents: read

jobs:
  validation-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Xvfb + libdbus + pkg-config
        # Xvfb: display for Compose Desktop + Robot input. libdbus / pkg-config: needed by
        # the spectre-wayland-helper Rust build (`:recording`'s assembleWaylandHelper runs
        # cargo build --release on Linux as part of processResources, and dbus-rs links
        # libdbus-1).
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libdbus-1-dev pkg-config

      - name: Set up Rust (for spectre-wayland-helper)
        uses: dtolnay/rust-toolchain@stable

      - name: Run validation tests under Xvfb
        # `--continue` so a failure in one task doesn't skip subsequent tasks — every
        # requested task gets a fair chance to produce its JUnit XML, and the verification
        # step below sees the full picture instead of cascade-skips.
        #
        # The Gradle test-executor protocol race that historically motivated a
        # `continue-on-error: true` belt-and-braces here is suppressed at its source by
        # serialising the validation Test tasks via a `ValidationTestSerialiser`
        # `BuildService` in `sample-desktop/build.gradle.kts` — see the comment block there.
        # If a Gradle-side problem ever surfaces from these invocations again, we want it to
        # fail the workflow loudly so we know to investigate, not be absorbed silently.
        #
        # Screen size 1280x1024 is xvfb-run's default; explicitly setting it via
        # `--server-args` would let us bump it for a denser virtual desktop, but the
        # validation tests don't need that and the default keeps the diff with
        # validation-windows.yml's runner config minimal.
        id: gradle
        run: |
          xvfb-run -a ./gradlew \
            :sample-desktop:validationTest \
            :sample-desktop:validationTestPopupLayers \
            --continue
        shell: bash

      - name: Run real-Robot Linux smoke under Xvfb
        # Counterpart to the manual `runWindowsRobotSmoke` (which stays manual on the Windows
        # workflow because hosted Windows runners don't reliably handle the alwaysOnTop window
        # manipulation the smoke needs). Linux + Xvfb is the one host configuration where a
        # real `java.awt.Robot` smoke runs cleanly in CI: Xvfb gives us a real Xorg display,
        # the smoke's Wayland gate stays out of the picture (no XDG_SESSION_TYPE=wayland, no
        # WAYLAND_DISPLAY, no wayland-* socket in XDG_RUNTIME_DIR), and Robot input + screen
        # capture work end-to-end.
        #
        # Extending this workflow rather than adding a sibling because the runner setup
        # (Xvfb + JDK 21 + Gradle + Rust) is identical and the path filters already cover
        # `sample-desktop/**`. A separate workflow file would just duplicate that setup with
        # no scope difference.
        #
        # The smoke's main() exits 0/1 based on PASS/FAIL via exitProcess, so Gradle's
        # JavaExec propagates failure naturally — no XML-verifier needed (unlike the test
        # tasks above).
        #
        # The unfocused variant (`runLinuxRobotUnfocusedSmoke`) runs as a separate step
        # below — split for independent failure attribution (so a regression in one doesn't
        # mask the other in the workflow summary).
        if: always()
        run: |
          xvfb-run -a ./gradlew :sample-desktop:runLinuxRobotSmoke
        shell: bash

      - name: Run real-Robot Linux unfocused smoke under Xvfb
        # Companion to the focused-smoke step above, exercising the `RobotDriver` path against
        # a deliberately-unfocused Compose window with a sibling distractor JFrame holding focus.
        # Wired in once the unfocused-smoke KDoc gained a real findings list (validated on
        # Ubuntu 24.04 GNOME under both XWayland and Xvfb — see `LinuxRobotUnfocusedSmoke.kt`'s
        # KDoc for the banked observations).
        #
        # `if: always()` so a focused-smoke failure above doesn't skip this — both smokes get
        # a fair chance to surface their own diagnostic output on every run.
        if: always()
        run: |
          xvfb-run -a ./gradlew :sample-desktop:runLinuxRobotUnfocusedSmoke
        shell: bash

      - name: Run agent attach integration + contract corpus under Xvfb
        # `AgentAttachIntegrationTest` validates the full attach → exercise → detach chain
        # against a child JVM running the `:agent-test-fixture` Compose app.
        # `AgentContractCorpusTest` is the agent leg of the shared #198 contract corpus
        # (same fixture + public AttachedAutomator entry points). Both assumption-skip on
        # headless JVMs; `ci.yml`'s `:check` job runs headless — so this Xvfb step is the
        # only place they execute on Linux CI. Without it, "macOS and Linux" agent support
        # (docs/guide/agent.md + capability-matrix.md) is only ever proven on macOS.
        #
        # Child-process display inheritance: the tests spawn the fixture via
        # `ProcessBuilder` without touching `environment()`, so the child inherits
        # `xvfb-run`'s `DISPLAY` (and the test JVM itself already passes
        # `-Djava.awt.headless=false` and `-XX:+EnableDynamicAgentLoading` to the fixture —
        # see `spawnComposeFixture` in the agent tests).
        #
        # Runs as its own step (not folded into the validation Gradle invocation above) so
        # the agent tests never share the X display with the Robot-driven sample-desktop
        # tasks — both sides drive real focus/keyboard input and would fight over the
        # active window if Gradle ran them in parallel. `if: always()` for independent
        # failure attribution, same as the smoke steps above.
        #
        # `--rerun-tasks` is load-bearing, not belt-and-braces: `gradle.properties` sets
        # `org.gradle.caching=true` and `gradle/actions/setup-gradle` restores the local
        # build cache between jobs, and `Test` is a cacheable task. Without this flag, a
        # later run with unchanged `:agent:test` inputs could mark the task `FROM-CACHE`,
        # restore a previous run's passing JUnit XML, and let the verifier below see
        # `tests=1 skipped=0` even though the attach round-trip never executed under *this*
        # job's Xvfb display. Forcing re-execution is the whole point of the check, so we
        # ignore the cache for this invocation.
        if: always()
        run: |
          xvfb-run -a ./gradlew :agent:test \
            --tests "*AgentAttachIntegrationTest*" \
            --tests "*AgentContractCorpusTest*" \
            --rerun-tasks
        shell: bash

      - name: Smoke the unpacked CLI distribution against the Compose fixture
        # This is deliberately separate from the classpath-based integration test above: it
        # proves the archive's generated launcher, embedded agent runtime, and fat JAR work
        # together after a user unpacks the published artifact.
        if: always()
        run: |
          ./gradlew :cli:packageLinuxX64
          archive="cli/build/construo/distributions/spectre-linuxX64.zip"
          distribution="$RUNNER_TEMP/spectre-cli"
          unzip -q "$archive" -d "$distribution"
          launcher="$(find "$distribution" -name spectre -type f -print -quit)"
          xvfb-run -a ./gradlew :cli:test \
            --tests "*DaemonFixtureIntegrationTest.CLI binary drives a Compose fixture through ps attach find click and screenshot" \
            --tests "*SpectreMcpStdioIntegrationTest*" \
            --rerun-tasks \
            -Dspectre.cli.distributionExecutable="$launcher"
        shell: bash

      - name: Verify validation tests passed via JUnit XML
        # Plain two-pass test-hygiene verifier (no longer compensating for the
        # protocol-flake — see workflow header):
        #
        # 1. **Required-set existence pass**: an explicit list of expected (task, class) pairs
        #    must each have a corresponding TEST-<fqn>.xml. A mid-class JVM crash that skipped
        #    writing one XML, or a Gradle compile / dependency-resolution failure that
        #    produced no XMLs at all, fails the verification with a clear error pointing at
        #    the missing entry.
        # 2. **Discovered-set inspection pass**: every TEST-*.xml found under any of the four
        #    validation task directories — including ones NOT in the required set, e.g. a new
        #    ValidationTest class added without updating this workflow — is parsed for
        #    `failures="N"` / `errors="N"`. Any non-zero count fails the step. Missing or
        #    unparsable attributes are treated as malformation (truncated XML, wrong schema)
        #    and also fail the step.
        if: always()
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          declare -A required_classes_by_task=(
            ["validationTest"]="Issue7CompletionValidationTest Issue8CompletionValidationTest Issue8FidelityValidationTest Issue14PerfValidationTest MultiWindowAndPopupValidationTest PopupLayerVariantsValidationTest RecompositionMonitorValidationTest AtomicCaptureValidationTest"
            ["validationTestLayerComponent"]="PopupLayerVariantsValidationTest"
            ["validationTestLayerSameCanvas"]="PopupLayerVariantsValidationTest"
            ["validationTestLayerWindow"]="PopupLayerVariantsValidationTest"
          )
          # Derive task_dirs from the associative array's keys rather than maintaining a
          # parallel list — see validation-windows.yml for the rationale.
          task_dirs=("${!required_classes_by_task[@]}")

          # Pass 1: required-set existence.
          missing=()
          for task_dir in "${!required_classes_by_task[@]}"; do
            for class_name in ${required_classes_by_task[$task_dir]}; do
              xml="sample-desktop/build/test-results/$task_dir/TEST-dev.sebastiano.spectre.sample.validation.${class_name}.xml"
              if [ ! -f "$xml" ]; then
                missing+=("$task_dir/${class_name}")
              fi
            done
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing JUnit XML reports for: ${missing[*]}. Gradle step outcome: ${{ steps.gradle.outcome }}"
            exit 1
          fi

          # Pass 2: discovered-set inspection.
          all_xml=()
          for task_dir in "${task_dirs[@]}"; do
            xmls=(sample-desktop/build/test-results/$task_dir/TEST-*.xml)
            all_xml+=("${xmls[@]}")
          done
          if [ "${#all_xml[@]}" -eq 0 ]; then
            echo "::error::No JUnit XML reports discovered under expected task directories — Gradle step outcome: ${{ steps.gradle.outcome }}"
            exit 1
          fi

          fail_total=0
          err_total=0
          malformed_total=0
          for f in "${all_xml[@]}"; do
            # `set -euo pipefail` aborts the script if any pipeline component returns
            # non-zero. `grep -oE` returns non-zero when no match is found, so wrap each
            # pipeline in `|| true` to capture missing-attribute cases without exiting.
            # Missing attributes are treated as MALFORMED (truncated XML, wrong schema)
            # so a corrupted report can't quietly pass by reporting "no failures" simply
            # because the failures="N" attribute didn't parse.
            failures_raw=$(grep -oE 'failures="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || true)
            errors_raw=$(grep -oE 'errors="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || true)
            if [ -z "$failures_raw" ] || [ -z "$errors_raw" ]; then
              echo "::error file=$f::Malformed JUnit XML — missing/unparsable failures or errors attribute"
              malformed_total=$((malformed_total + 1))
              continue
            fi
            if [ "$failures_raw" -gt 0 ] || [ "$errors_raw" -gt 0 ]; then
              echo "::error file=$f::Test class reported failures=$failures_raw errors=$errors_raw"
              fail_total=$((fail_total + failures_raw))
              err_total=$((err_total + errors_raw))
            fi
          done
          if [ "$malformed_total" -gt 0 ]; then
            echo "::error::$malformed_total XML report(s) were malformed (missing failures/errors attribute)."
            exit 1
          fi
          if [ "$fail_total" -gt 0 ] || [ "$err_total" -gt 0 ]; then
            echo "::error::Validation tests reported $fail_total failure(s) and $err_total error(s) across ${#all_xml[@]} XML report(s)."
            exit 1
          fi
          echo "All required classes present; ${#all_xml[@]} discovered XML report(s) clean."
        shell: bash

      - name: Verify agent attach + contract corpus executed via JUnit XML
        # A green `:agent:test` exit code is NOT sufficient evidence the round-trip ran:
        # tests self-skip through JUnit assumptions (headless JVM, missing
        # `runtimeJar` system property), and both of those exit 0 — which is precisely how
        # attach sat silently skipped in `ci.yml`'s headless `:check` run while the docs
        # claimed Linux coverage. (Cache-replay of a stale passing XML is handled upstream
        # by `--rerun-tasks` on the run step; this verifier catches the assumption-skips.)
        # So beyond the failures/errors hygiene the sample-desktop verifier above does,
        # this one also requires each class to have actually RUN: tests ≥ 1 and skipped = 0.
        # `AgentContractCorpusTest` is the #198 matrix evidence for agent Supported cells.
        if: always()
        run: |
          set -euo pipefail
          # `grep -oE` returns non-zero on no match; `|| true` captures missing attributes
          # as empty strings so they fall into the malformation branch instead of aborting
          # the script under `set -e` (same pattern as the verifier above).
          verify_agent_xml() {
            local class_name="$1"
            local xml="agent/build/test-results/test/TEST-dev.sebastiano.spectre.agent.${class_name}.xml"
            if [ ! -f "$xml" ]; then
              echo "::error::Missing JUnit XML report $xml — :agent:test never ran $class_name"
              exit 1
            fi
            get_attr() {
              grep -oE "$1=\"[0-9]+\"" "$xml" | head -n1 | grep -oE '[0-9]+' || true
            }
            local tests skipped failures errors
            tests=$(get_attr tests)
            skipped=$(get_attr skipped)
            failures=$(get_attr failures)
            errors=$(get_attr errors)
            if [ -z "$tests" ] || [ -z "$skipped" ] || [ -z "$failures" ] || [ -z "$errors" ]; then
              echo "::error file=$xml::Malformed JUnit XML — missing/unparsable tests/skipped/failures/errors attribute"
              exit 1
            fi
            if [ "$tests" -lt 1 ] || [ "$skipped" -gt 0 ]; then
              echo "::error file=$xml::$class_name did not execute (tests=$tests skipped=$skipped) — an assumption-skip under Xvfb means the display setup or the runtimeJar wiring in agent/build.gradle.kts broke"
              exit 1
            fi
            if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then
              echo "::error file=$xml::$class_name reported failures=$failures errors=$errors"
              exit 1
            fi
            echo "$class_name executed: tests=$tests skipped=0 failures=0 errors=0."
          }
          verify_agent_xml "AgentAttachIntegrationTest"
          verify_agent_xml "AgentContractCorpusTest"
        shell: bash

      - name: Upload validation artefacts
        # Always upload — useful both for diagnosing failures and for confirming what ran on
        # green builds.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-linux-artifacts
          path: |
            sample-desktop/build/reports/tests/
            sample-desktop/build/test-results/
            sample-desktop/hs_err_*.log
            agent/build/reports/tests/
            agent/build/test-results/
            agent/hs_err_*.log
            cli/build/reports/tests/
            cli/build/test-results/
            cli/hs_err_*.log
          if-no-files-found: ignore
          retention-days: 14
