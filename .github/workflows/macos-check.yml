name: macOS check

# Runs the JVM checks on a real macOS host for full-OS-matrix parity with `ci.yml` (ubuntu)
# and `windows.yml` (Windows). The existing `macos.yml` is *focused* — it builds the SCK Swift
# helper and runs `:recording:check` only, gated on `recording/**` and `recording-macos/**`.
# That doesn't catch macOS-specific regressions in `core/`, `server/`, `sample-desktop/`, or
# `testing/`.
#
# The split into two macOS workflows is intentional: `macos.yml` stays small + fast and only
# fires when the recording surface changes, while this `macos-check` job mirrors the broader
# path filter from `windows.yml` so any PR likely to affect cross-OS behaviour gets exercised
# on a real mac runner. macOS-* runners are slower and more expensive than ubuntu, so the path
# filter keeps unrelated PRs (docs, plugin-only, etc.) out of this job.
#
# Notes:
#   - `:recording:check` runs here too as a side effect of `:check`, so this overlaps with
#     `macos.yml`'s focused job. That's OK — the focused job is faster + has its own Swift
#     helper-build step, so it stays the primary signal for recording-only changes.
#   - End-to-end SCK recording isn't exercised here either (CI runners don't have Screen
#     Recording TCC); the helper contract test stays unchanged.

on:
  pull_request:
    paths:
      - "core/**"
      - "agent/**"
      - "agent-runtime/**"
      - "agent-test-fixture/**"
      - "cli/**"
      - "buildSrc/**"
      - "recording/**"
      - "recording-linux/**"
      - "recording-macos/**"
      - "recording-windows/**"
      - "sample-desktop/**"
      - "server/**"
      - "testing/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/macos-check.yml"
  push:
    branches:
      - main
    paths:
      - "core/**"
      - "agent/**"
      - "agent-runtime/**"
      - "agent-test-fixture/**"
      - "cli/**"
      - "buildSrc/**"
      - "recording/**"
      - "recording-linux/**"
      - "recording-macos/**"
      - "recording-windows/**"
      - "sample-desktop/**"
      - "server/**"
      - "testing/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/macos-check.yml"

permissions:
  contents: read

jobs:
  check-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        # Same Temurin choice as ci.yml + windows.yml — local dev uses JBR 21 via `JAVA_HOME`.
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run checks
        run: ./gradlew check

      - name: Verify agent attach + contract corpus executed via JUnit XML
        # Same fail-closed gate as validation-linux.yml: a green `:check` is not enough if
        # AgentAttachIntegrationTest / AgentContractCorpusTest assumption-skipped (e.g. headless
        # or missing runtimeJar). macOS Supported matrix cells cite this workflow as evidence.
        if: always()
        run: |
          set -euo pipefail
          verify_agent_xml() {
            local class_name="$1"
            local xml="agent/build/test-results/test/TEST-dev.sebastiano.spectre.agent.${class_name}.xml"
            if [ ! -f "$xml" ]; then
              echo "::error::Missing JUnit XML report $xml — :check never ran $class_name"
              exit 1
            fi
            get_attr() {
              grep -oE "$1=\"[0-9]+\"" "$xml" | head -n1 | grep -oE '[0-9]+' || true
            }
            local tests skipped failures errors
            tests=$(get_attr tests)
            skipped=$(get_attr skipped)
            failures=$(get_attr failures)
            errors=$(get_attr errors)
            if [ -z "$tests" ] || [ -z "$skipped" ] || [ -z "$failures" ] || [ -z "$errors" ]; then
              echo "::error file=$xml::Malformed JUnit XML — missing/unparsable tests/skipped/failures/errors attribute"
              exit 1
            fi
            if [ "$tests" -lt 1 ] || [ "$skipped" -gt 0 ]; then
              echo "::error file=$xml::$class_name did not execute (tests=$tests skipped=$skipped)"
              exit 1
            fi
            if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then
              echo "::error file=$xml::$class_name reported failures=$failures errors=$errors"
              exit 1
            fi
            echo "$class_name executed: tests=$tests skipped=0 failures=0 errors=0."
          }
          verify_agent_xml "AgentAttachIntegrationTest"
          verify_agent_xml "AgentContractCorpusTest"
        shell: bash

      - name: Smoke the unpacked CLI distribution against the Compose fixture
        run: |
          case "$(uname -m)" in
            arm64) target="MacosArm64"; archive="cli/build/construo/distributions/spectre-macosArm64.zip" ;;
            x86_64) target="MacosX64"; archive="cli/build/construo/distributions/spectre-macosX64.zip" ;;
            *) echo "Unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          ./gradlew ":cli:package$target"
          distribution="$RUNNER_TEMP/spectre-cli"
          unzip -q "$archive" -d "$distribution"
          launcher="$(find "$distribution" -path '*/Contents/MacOS/spectre' -type f -print -quit)"
          ./gradlew :cli:test \
            --tests "*DaemonFixtureIntegrationTest.CLI binary drives a Compose fixture through ps attach find click and screenshot" \
            --tests "*SpectreMcpStdioIntegrationTest*" \
            --rerun-tasks \
            -Dspectre.cli.distributionExecutable="$launcher"

      - name: Upload CLI smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-cli-smoke-test-reports
          path: |
            cli/build/reports/tests/
            cli/build/test-results/
            cli/hs_err_*.log
          if-no-files-found: ignore
          retention-days: 14
